{% extends "base.html" %}
{% block title %}儀表板 – Suricata IDS{% endblock %}

{% block content %}

<!-- ── Capture Control Bar ─────────────────────────────────────────────── -->
<div class="card mb-3 border-0" id="captureBar">
  <div class="card-body py-2">
    <div class="row g-2 align-items-center">
      <div class="col-auto">
        <div class="d-flex align-items-center gap-2">
          <span class="fs-6 fw-bold"><i class="bi bi-record-circle"></i> 封包側錄</span>
          <span id="capBadge" class="badge bg-secondary">閒置</span>
        </div>
      </div>
      <div class="col-md-4">
        <div class="input-group input-group-sm">
          <span class="input-group-text"><i class="bi bi-hdd-network"></i></span>
          <select id="ifaceSelect" class="form-select form-select-sm">
            <option value="">-- 選擇網卡 --</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" onclick="loadInterfaces()" title="重新整理網卡列表">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
      </div>
      <div class="col-auto d-flex gap-2">
        <button id="btnStart" class="btn btn-success btn-sm" onclick="startCapture()">
          <i class="bi bi-play-fill"></i> 開始側錄
        </button>
        <button id="btnStop" class="btn btn-danger btn-sm d-none" onclick="stopCapture()">
          <i class="bi bi-stop-fill"></i> 停止側錄
        </button>
      </div>
      <div class="col-auto ms-auto small text-muted" id="capInfo"></div>
    </div>
    <div id="capErrMsg" class="mt-1"></div>
  </div>
</div>

<!-- ── Stat Cards ──────────────────────────────────────────────────────── -->
<div class="row g-3 mb-3">
  <div class="col-6 col-md-3">
    <div class="card text-white bg-primary h-100">
      <div class="card-body">
        <div class="d-flex justify-content-between">
          <div><div class="fs-5 fw-bold" id="statTotal">-</div><div class="small">總告警數</div></div>
          <i class="bi bi-bell-fill fs-3 opacity-50"></i>
        </div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="card text-white bg-danger h-100">
      <div class="card-body">
        <div class="d-flex justify-content-between">
          <div><div class="fs-5 fw-bold" id="statToday">-</div><div class="small">今日告警</div></div>
          <i class="bi bi-calendar-day-fill fs-3 opacity-50"></i>
        </div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="card text-white bg-warning h-100">
      <div class="card-body">
        <div class="d-flex justify-content-between">
          <div><div class="fs-5 fw-bold" id="statP1">-</div><div class="small">今日 Priority 1</div></div>
          <i class="bi bi-exclamation-octagon-fill fs-3 opacity-50"></i>
        </div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="card text-white bg-info h-100">
      <div class="card-body">
        <div class="d-flex justify-content-between">
          <div><div class="fs-5 fw-bold" id="statP2">-</div><div class="small">今日 Priority 2</div></div>
          <i class="bi bi-exclamation-triangle-fill fs-3 opacity-50"></i>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Live Traffic Chart ─────────────────────────────────────────────── -->
<div class="card mb-3" id="liveTrafficCard">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>
      <i class="bi bi-activity text-success"></i>
      <span class="fw-bold">即時流量</span>
      <span class="ms-2 text-muted small">（最近 60 秒）</span>
    </span>
    <div class="d-flex align-items-center gap-3">
      <span class="small text-muted">當前：<b id="liveCurKbps">0</b> KB/s</span>
      <span class="small text-muted">峰值：<b id="livePeakKbps">0</b> KB/s</span>
      <span class="small text-muted">累計：<b id="liveTotal">0 MB</b></span>
    </div>
  </div>
  <div class="card-body pb-2 pt-3">
    <canvas id="liveTrafficChart" height="55"></canvas>
  </div>
</div>

<!-- ── History Chart + Severity ──────────────────────────────────────── -->
<div class="row g-3 mb-3">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-graph-up"></i> 告警時間線</span>
        <select id="timeRange" class="form-select form-select-sm w-auto">
          <option value="1">最近 1h</option>
          <option value="24" selected>最近 24h</option>
          <option value="168">最近 7d</option>
        </select>
      </div>
      <div class="card-body"><canvas id="timelineChart" height="100"></canvas></div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-header"><i class="bi bi-pie-chart-fill"></i> 威脅嚴重性分佈</div>
      <div class="card-body d-flex align-items-center justify-content-center">
        <canvas id="severityChart"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- ── Top-N + Recent Alerts ─────────────────────────────────────────── -->
<div class="row g-3">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-bar-chart-fill"></i> Top 10</span>
        <select id="topnDim" class="form-select form-select-sm w-auto">
          <option value="src_ip">來源 IP</option>
          <option value="dst_ip">目的 IP</option>
          <option value="proto">協議</option>
          <option value="country_src">來源國別</option>
          <option value="bytes">流量（Top Talkers）</option>
        </select>
      </div>
      <div class="card-body"><canvas id="topnChart" height="180"></canvas></div>
    </div>
  </div>
  <div class="col-md-7">
    <div class="card">
      <div class="card-header"><i class="bi bi-list-ul"></i> 最新告警</div>
      <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0">
          <thead class="table-dark">
            <tr><th>時間</th><th>來源 IP</th><th>告警</th><th>優先</th></tr>
          </thead>
          <tbody id="recentAlerts"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const SEVERITY_COLORS = {1:'#dc3545',2:'#fd7e14',3:'#ffc107',4:'#6c757d'};
const SEVERITY_LABELS = {1:'P1 緊急',2:'P2 高危',3:'P3 中危',4:'P4 低危'};

let timelineChart, severityChart, topnChart, liveTrafficChart;
let peakKbps = 0;

// ── Chart.js helpers ──────────────────────────────────────────────────────

function initCharts() {
  // Live traffic – gradient fill
  const liveCtx = document.getElementById('liveTrafficChart').getContext('2d');
  const grad = liveCtx.createLinearGradient(0, 0, 0, 160);
  grad.addColorStop(0,   'rgba(25,135,84,0.45)');
  grad.addColorStop(1,   'rgba(25,135,84,0.02)');
  liveTrafficChart = new Chart(liveCtx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'KB/s',
        data: [],
        borderColor: '#198754',
        backgroundColor: grad,
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      animation: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.parsed.y} KB/s` }
      }},
      scales: {
        x: { ticks: { maxTicksLimit: 10, font: { size: 10 } }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { callback: v => v + ' KB/s', font: { size: 10 } } }
      }
    }
  });

  timelineChart = new Chart(document.getElementById('timelineChart'), {
    type: 'line',
    data: { labels:[], datasets:[{
      label:'告警數', data:[], borderColor:'#0d6efd',
      backgroundColor:'rgba(13,110,253,0.1)', fill:true, tension:0.3
    }]},
    options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
  });

  severityChart = new Chart(document.getElementById('severityChart'), {
    type: 'doughnut',
    data: { labels:[], datasets:[{data:[], backgroundColor:['#dc3545','#fd7e14','#ffc107','#6c757d']}] },
    options: { responsive:true }
  });

  topnChart = new Chart(document.getElementById('topnChart'), {
    type: 'bar',
    data: { labels:[], datasets:[{label:'次數', data:[], backgroundColor:'#0dcaf0'}] },
    options: { indexAxis:'y', responsive:true, plugins:{legend:{display:false}} }
  });
}

// ── Live traffic ──────────────────────────────────────────────────────────

function refreshLiveTraffic() {
  fetch('/api/traffic/live').then(r => r.json()).then(data => {
    if (!data.length) return;
    const labels = data.map(d => d.ts);
    const values = data.map(d => d.kbps);
    liveTrafficChart.data.labels           = labels;
    liveTrafficChart.data.datasets[0].data = values;
    liveTrafficChart.update('none');   // no animation for real-time

    const cur = values[values.length - 1] ?? 0;
    peakKbps  = Math.max(peakKbps, ...values);
    document.getElementById('liveCurKbps').textContent  = cur.toFixed(1);
    document.getElementById('livePeakKbps').textContent = peakKbps.toFixed(1);
  });
}

// ── Dashboard stats ───────────────────────────────────────────────────────

function fmtBytes(b) {
  if (b < 1024)            return b + ' B';
  if (b < 1024*1024)       return (b/1024).toFixed(1) + ' KB';
  if (b < 1024*1024*1024)  return (b/(1024*1024)).toFixed(1) + ' MB';
  return (b/(1024*1024*1024)).toFixed(2) + ' GB';
}

function refreshDashboard() {
  fetch('/api/dashboard').then(r => r.json()).then(d => {
    const s   = d.stats;
    const st  = d.status;

    document.getElementById('statTotal').textContent = s.total_alerts;
    document.getElementById('statToday').textContent = s.today_alerts;
    document.getElementById('statP1').textContent    = s.today_p1;
    document.getElementById('statP2').textContent    = s.today_p2;
    document.getElementById('liveTotal').textContent = fmtBytes(st.total_captured || 0);

    // Capture bar state
    const badge  = document.getElementById('capBadge');
    const btnS   = document.getElementById('btnStart');
    const btnSt  = document.getElementById('btnStop');
    const capInfo = document.getElementById('capInfo');

    if (st.capturing) {
      badge.className  = 'badge bg-success';
      badge.textContent = `● 側錄中 (${st.interface})`;
      btnS.classList.add('d-none');
      btnSt.classList.remove('d-none');
      capInfo.textContent = st.queue_size > 0
        ? `分析佇列：${st.queue_size} 個 PCAP 待處理`
        : (st.analyzing ? '⚙ 分析中...' : '');
    } else {
      badge.className  = 'badge bg-secondary';
      badge.textContent = '閒置';
      btnS.classList.remove('d-none');
      btnSt.classList.add('d-none');
      capInfo.textContent = st.analyzing ? '⚙ 分析中...' : '';
    }

    // Recent alerts table
    const tbody = document.getElementById('recentAlerts');
    tbody.innerHTML = '';
    (s.recent_alerts || []).forEach(a => {
      const p   = a.priority;
      const cls = p===1?'table-danger':p===2?'table-warning':'';
      const ts  = (a.timestamp||'').substring(0,19).replace('T',' ');
      tbody.innerHTML += `<tr class="${cls}">
        <td class="small">${ts}</td>
        <td>${a.src_ip||''}</td>
        <td class="text-truncate" style="max-width:200px" title="${a.signature||''}">${a.signature||''}</td>
        <td><span class="badge" style="background:${SEVERITY_COLORS[p]||'#6c757d'}">P${p}</span></td>
      </tr>`;
    });
  });
}

function refreshTimeline() {
  const h = document.getElementById('timeRange').value;
  fetch(`/api/stats/timeseries?hours=${h}`).then(r => r.json()).then(data => {
    timelineChart.data.labels                = data.map(d => d.hour);
    timelineChart.data.datasets[0].data      = data.map(d => d.count);
    timelineChart.update();
  });
}

function refreshSeverity() {
  fetch('/api/stats/severity').then(r => r.json()).then(data => {
    severityChart.data.labels                = data.map(d => SEVERITY_LABELS[d.severity] || `P${d.severity}`);
    severityChart.data.datasets[0].data      = data.map(d => d.count);
    severityChart.update();
  });
}

function refreshTopN() {
  const dim = document.getElementById('topnDim').value;
  fetch(`/api/topn?dim=${dim}&n=10&hours=0`).then(r => r.json()).then(data => {
    const isBytes = (dim === 'bytes');
    topnChart.data.labels                    = data.map(d => d.label || 'N/A');
    topnChart.data.datasets[0].data          = isBytes
      ? data.map(d => parseFloat((d.count / 1024).toFixed(1)))
      : data.map(d => d.count);
    topnChart.data.datasets[0].label         = isBytes ? 'KB' : '封包數';
    topnChart.update();
  });
}

// ── Capture control ───────────────────────────────────────────────────────

function loadInterfaces() {
  fetch('/api/interfaces').then(r => r.json()).then(data => {
    const sel = document.getElementById('ifaceSelect');
    sel.innerHTML = '<option value="">-- 選擇網卡 --</option>';
    (data || []).forEach(i => {
      sel.innerHTML += `<option value="${i.index}">${i.name}</option>`;
    });
    // Re-select saved interface
    fetch('/api/settings').then(r => r.json()).then(s => {
      if (s.interface) {
        for (const opt of sel.options) {
          if (opt.value === s.interface) { opt.selected = true; break; }
        }
      }
    });
  }).catch(() => {
    document.getElementById('capErrMsg').innerHTML =
      `<div class="alert alert-warning py-1 small mb-0">無法取得網卡列表，請確認 Wireshark (dumpcap) 已安裝。</div>`;
  });
}

function startCapture() {
  const iface = document.getElementById('ifaceSelect').value;
  if (!iface) {
    document.getElementById('capErrMsg').innerHTML =
      `<div class="alert alert-danger py-1 small mb-0">請先選擇網卡</div>`;
    return;
  }
  document.getElementById('capErrMsg').innerHTML = '';
  peakKbps = 0;
  fetch('/api/capture/start', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({interface: iface})
  }).then(r => r.json()).then(d => {
    if (!d.ok) {
      document.getElementById('capErrMsg').innerHTML =
        `<div class="alert alert-danger py-1 small mb-0">${d.error}</div>`;
    }
  });
}

function stopCapture() {
  fetch('/api/capture/stop', {method: 'POST'});
}

// ── Init + polling ────────────────────────────────────────────────────────

initCharts();
loadInterfaces();

function refreshAll() {
  refreshDashboard();
  refreshTimeline();
  refreshSeverity();
  refreshTopN();
}
refreshAll();
setInterval(refreshAll, 5000);

// Live traffic refreshes every second for smooth animation
setInterval(refreshLiveTraffic, 1000);

document.getElementById('timeRange').addEventListener('change', refreshTimeline);
document.getElementById('topnDim').addEventListener('change', refreshTopN);
</script>
{% endblock %}
