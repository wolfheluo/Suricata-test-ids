<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Suricata IDS{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}">
{% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shield-fill-check text-success"></i> Suricata IDS</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if request.path=='/' %}active{% endif %}" href="/"><i class="bi bi-speedometer2"></i> 儀表板</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path=='/events' %}active{% endif %}" href="/events"><i class="bi bi-exclamation-triangle"></i> 告警事件</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path=='/pcap' %}active{% endif %}" href="/pcap"><i class="bi bi-file-earmark-zip"></i> PCAP 管理</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path=='/settings' %}active{% endif %}" href="/settings"><i class="bi bi-gear"></i> 設定</a></li>
      </ul>
      <span class="navbar-text" id="navStatus">
        <span class="badge bg-secondary" id="statusBadge"><i class="bi bi-circle-fill"></i> 載入中</span>
      </span>
    </div>
  </div>
</nav>

<div class="container-fluid mt-3">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
// Update navbar status badge every 5 s
function refreshNavStatus() {
  fetch('/api/dashboard').then(r => r.json()).then(d => {
    const s = d.status;
    const badge = document.getElementById('statusBadge');
    if (s.capturing) {
      badge.className = 'badge bg-success';
      badge.innerHTML = `<i class="bi bi-record-circle"></i> 側錄中 (${s.interface})`;
    } else if (s.analyzing) {
      badge.className = 'badge bg-warning text-dark';
      badge.innerHTML = `<i class="bi bi-cpu"></i> 分析中`;
    } else {
      badge.className = 'badge bg-secondary';
      badge.innerHTML = `<i class="bi bi-stop-circle"></i> 閒置`;
    }
  }).catch(() => {});
}
refreshNavStatus();
setInterval(refreshNavStatus, 5000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
